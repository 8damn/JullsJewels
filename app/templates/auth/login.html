{% extends "base.html" %}
{% block title %}{{ t("auth.login_title") }} — Jullsjewels{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="auth-box">
    <h1>{{ t("auth.login_title") }}</h1>
    <form method="post" action="/auth/login" class="form-stack">
      {{ csrf_input(csrf_token) }}
      <div class="form-group">
        <label>{{ t("auth.email") }}</label>
        <input type="email" name="email" required autofocus>
      </div>
      <div class="form-group">
        <label>{{ t("auth.password") }}</label>
        <input type="password" name="password" required>
      </div>
      <button type="submit" class="btn btn--primary btn--full">{{ t("auth.login_btn") }}</button>
    </form>
    <p class="muted" style="margin-top:1.25rem;text-align:center">
      {{ t("auth.no_account") }} <a href="/auth/register" style="color:var(--accent)">{{ t("auth.register_btn") }}</a>
    </p>
  </div>
</div>
{% endblock %}
